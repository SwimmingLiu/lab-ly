<a href="{publications.url}" rel="noopener noreferrer" class="group relative flex flex-col overflow-hidden rounded-2xl border border-dashed border-neutral-300 bg-white transition duration-300 ease-out hover:-translate-x-1 hover:-translate-y-1 hover:border-neutral-400 sm:flex-row dark:border-neutral-700 dark:bg-neutral-950 dark:hover:border-neutral-500">
    <div class="aspect-[3/2] w-full shrink-0 overflow-hidden bg-neutral-100 sm:w-56 md:w-64 dark:bg-neutral-900">
        <img src="{publications.image}" alt="{publications.title}" class="h-full w-full object-cover transition duration-300 ease-out group-hover:scale-[1.02]" loading="lazy" />
    </div>
    <div class="flex min-w-0 flex-1 flex-col justify-center p-5 sm:p-6">
        <div class="mb-3 flex flex-wrap items-center gap-2 text-xs font-medium uppercase tracking-wide text-neutral-500 dark:text-neutral-400">
            <span>{publications.journal}</span>
            <span class="h-1 w-1 rounded-full bg-neutral-300 dark:bg-neutral-700"></span>
            <span>{publications.dateLabel}</span>
        </div>
        <h2 class="text-lg font-semibold leading-snug text-neutral-900 dark:text-neutral-100">{publications.title}</h2>
        <p data-i18n="{publications.authorsKey}" class="mt-3 text-sm leading-6 text-neutral-600 dark:text-neutral-400">{publications.authors}</p>
        <p class="mt-4 text-xs font-medium uppercase tracking-wide text-neutral-500 dark:text-neutral-500">DOI: {publications.doi}</p>
    </div>
</a>
