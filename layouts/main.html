<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>

    <!-- Used to add persisted display modes right away, preventing flicker -->
    <script>
        (function(){
            function getStoredValue(key){
                try {
                    if(typeof(Storage) !== "undefined"){
                        return localStorage.getItem(key);
                    }
                } catch (error) {
                    return null;
                }
                return null;
            }

            if(getStoredValue('dark_mode') == 'true'){
                document.documentElement.classList.add('dark');
            }

            if(getStoredValue('site_language') == 'zh'){
                document.documentElement.lang = 'zh-CN';
            } else {
                document.documentElement.lang = 'en';
            }
        })();
    </script>
    
    <style>
        .prose img{
            border-radius: 20px;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="/assets/images/YangLiLab-LOGO.png">
    <script src="//unpkg.com/alpinejs" defer></script>
    {tailwindcss}
</head>
<body class="antialiased bg-white dark:bg-neutral-950">
    <!-- 顶部方形线段特效 -->
    <include src="square-lines.html"></include> 
    <!-- 导航栏 -->
    <include src="header.html"></include>
    {slot}
    <include src="footer.html"></include>
    <script src="/assets/js/main.js"></script>
</body>
</html>
